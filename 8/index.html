      /* Мгновенный экран загрузки: рисуется до подхвата JS, снимается React'ом.
         Фон body НЕ задаём: живое небо (Bg) лежит на z-index:-10 и непрозрачный
         body его перекрыл бы. Пустой экран до JS закрывает #boot своим фоном. */
      #boot {
        position: fixed; inset: 0; z-index: 200;
        background: linear-gradient(180deg, #16304f 0%, #0c1e35 100%);
        display: flex; align-items: center; justify-content: center; gap: 10px;
      }
      #boot i {
        width: 9px; height: 9px; border-radius: 50%; background: #a8c8dc;
        animation: bootPulse 0.9s ease-in-out infinite alternate;
      }
      #boot i:nth-child(2) { animation-delay: 0.18s; background: #dcebf5; }
      #boot i:nth-child(3) { animation-delay: 0.36s; background: #ffdf9e; }
      @keyframes bootPulse { from { opacity: 0.25; transform: scale(0.8); } to { opacity: 1; transform: scale(1.15); } }
      @media (prefers-reduced-motion: reduce) { #boot i { animation: none; } }
    </style>
