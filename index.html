<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Наше дело — каталог вариантов лендинга</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-deep: #0f2847;
      --blue-mid: #1e4976;
      --blue-sky: #a8c8dc;
      --concrete: #e4e4e0;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #1a202c;
      background: linear-gradient(180deg, #b5d2e3 0%, #e8f0f6 30%, #f7f9fb 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }
    header { margin-bottom: 40px; }
    .kicker {
      display: flex; align-items: center; gap: 12px;
      font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
      font-weight: 600; color: var(--blue-mid); margin-bottom: 16px;
    }
    .kicker::before { content: ""; width: 48px; height: 1px; background: var(--blue-mid); }
    h1 {
      font-family: 'Unbounded', sans-serif; font-weight: 900;
      font-size: clamp(1.8rem, 4.5vw, 3rem); color: var(--blue-deep); line-height: 1.05;
    }
    .sub { margin-top: 12px; color: #3a4a5f; max-width: 640px; line-height: 1.6; }

    .grid {
      display: grid; gap: 28px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .card {
      background: #fff; border: 1px solid rgba(15,40,71,0.1); border-radius: 4px;
      overflow: hidden; position: relative;
      transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -15px rgba(15,40,71,0.25);
    }
    .preview {
      position: relative; aspect-ratio: 16 / 10; overflow: hidden;
      background: var(--concrete); display: block;
    }
    .preview iframe {
      width: 1280px; height: 800px; border: 0;
      transform-origin: 0 0; pointer-events: none;
      position: absolute; top: 0; left: 0;
    }
    .preview .open-overlay {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: flex-end; justify-content: flex-end;
      padding: 12px; text-decoration: none;
      background: linear-gradient(180deg, transparent 70%, rgba(15,40,71,0.15));
      opacity: 0; transition: opacity .3s;
    }
    .card:hover .open-overlay { opacity: 1; }
    .open-overlay span {
      background: var(--blue-deep); color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; padding: 8px 14px; border-radius: 2px;
    }
    .meta { padding: 18px 20px 20px; }
    .meta-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .title-link {
      font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 17px;
      color: var(--blue-deep); text-decoration: none;
    }
    .title-link:hover { text-decoration: underline; }
    .info-btn {
      width: 32px; height: 32px; flex-shrink: 0; border: 0; cursor: pointer;
      color: #fff; font-weight: 700; font-size: 15px; line-height: 1;
      background: linear-gradient(135deg, #5a6778, #8a95a5 55%, #4a5568);
      clip-path: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
      transition: transform .35s cubic-bezier(.2,.8,.2,1), background .3s;
    }
    .info-btn:hover { transform: translateY(-2px); }
    .card.open .info-btn {
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-deep));
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      font-size: 11px; font-weight: 600; letter-spacing: .04em;
      background: rgba(30,73,118,0.08); color: var(--blue-mid);
      padding: 4px 8px; border-radius: 2px;
    }
    .date { margin-top: 12px; font-size: 12px; color: #77808c; }

    /* Раскрывающийся блок «информация о варианте» */
    .info-wrap {
      height: 0;
      overflow: hidden;
      transition: height .55s cubic-bezier(.2,.8,.2,1);
    }
    .info-body {
      margin: 6px 20px 20px;
      border: 1px solid rgba(15,40,71,0.12);
      border-top: 3px solid transparent;
      border-image: linear-gradient(90deg, var(--blue-mid), #8a95a5, var(--blue-sky)) 1;
      background:
        linear-gradient(rgba(30,73,118,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,73,118,0.035) 1px, transparent 1px),
        #fafcfe;
      background-size: 18px 18px;
      padding: 18px 20px 20px;
      line-height: 1.6; font-size: 14px; color: #2a3648;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity .4s ease .12s, transform .45s cubic-bezier(.2,.8,.2,1) .12s;
    }
    .card.open .info-body { opacity: 1; transform: translateY(0); }
    .info-body h3 {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; text-transform: uppercase; letter-spacing: .18em;
      color: var(--blue-mid); margin: 16px 0 7px; font-weight: 700;
    }
    .info-body h3::after {
      content: ""; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(30,73,118,0.25), transparent);
    }
    .info-body h3:first-child { margin-top: 0; }
    .info-body ul { list-style: none; padding: 0; }
    .info-body li {
      margin: 4px 0; padding-left: 18px; position: relative;
    }
    .info-body li::before {
      content: ""; position: absolute; left: 2px; top: 8px;
      width: 6px; height: 6px; transform: rotate(45deg);
      background: var(--blue-sky); outline: 1px solid var(--blue-mid);
    }
    @media (prefers-reduced-motion: reduce) {
      .info-wrap, .info-body, .info-btn, .card { transition: none; }
    }

    footer { margin-top: 56px; font-size: 12px; color: #77808c; }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--blue-mid); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Внутренняя страница · для выбора варианта</div>
      <h1>«Наше дело» — варианты лендинга</h1>
      <p class="sub">
        Каталог макетов сайта образовательной программы. Кликните по превью или названию,
        чтобы открыть вариант целиком. Кнопка «?» — подробности о варианте.
      </p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>Каталог обновляется по мере появления новых вариантов.</footer>
  </div>

  <script>
    // Добавление нового варианта = новый объект в этом массиве + папка /N/ рядом.
    const VARIANTS = [
      {
        n: 1,
        title: 'Вариант 1 — «Металл и небо»',
        date: '2026-07-12',
        tags: ['React', 'Framer Motion', 'светлый', 'анимации'],
        info: `
          <h3>Концепция</h3>
          Строгий мужественный стиль: металл и бетон как символы силы и фундамента,
          светлое мирное небо с облаками как символ возвращения к мирной жизни.
          Сайт светлый, тёмные только акценты.
          <h3>Что внутри</h3>
          <ul>
            <li>Каскадное появление hero, дрейфующие облака с параллаксом</li>
            <li>Анимированные счётчики (2 дня / 9 экспертов / 7 городов / 100% бесплатно)</li>
            <li>Гигантские номера секций фоном, scroll-spy в меню, прогресс-бар чтения</li>
            <li>3D-наклон карточек спикеров, блик «металла» на кнопках, плавный FAQ</li>
          </ul>
          <h3>Статус</h3>
          <ul>
            <li>Спикеры — заглушки (ждём состав)</li>
            <li>Кнопка регистрации ведёт на заглушку Яндекс-формы</li>
            <li>Контакты в футере условные</li>
          </ul>
          <h3>Технически</h3>
          React 18 + Tailwind 4 + Framer Motion, статическая сборка ~98 КБ gzip,
          адаптив, поддержка prefers-reduced-motion.`,
      },
      {
        n: 2,
        title: 'Вариант 2 — «Чертёж дела»',
        date: '2026-07-12',
        tags: ['React', 'Framer Motion', 'фаски', 'wow-эффекты'],
        info: `
          <h3>Концепция</h3>
          Технический чертёж: участник строит своё дело «по чертежу». Чертёжная сетка,
          размерные линии, штампы-«основные надписи» как на ГОСТ-чертежах — плюс стальные
          пластины со срезанными фасками и заклёпками. Светлый, строгий, инженерный.
          <h3>Вау-эффекты</h3>
          <ul>
            <li>Интро: стальные шторки расходятся при загрузке</li>
            <li>Hero: дом-чертёж рисует себя штрих за штрихом; световое пятно следует за курсором</li>
            <li>Расписание — маршрут: линия трассы дорисовывается по мере скролла</li>
            <li>Программа — табы-пластины с перелистыванием и «галочками», рисующимися по одной</li>
            <li>Бегущая строка городов, магнитная кнопка регистрации, блики металла</li>
            <li>Футер оформлен как основная надпись чертежа</li>
          </ul>
          <h3>Статус</h3>
          <ul>
            <li>Спикеры — заглушки, ссылка регистрации — заглушка, контакты условные</li>
          </ul>
          <h3>Технически</h3>
          React 18 + Tailwind 4 + Framer Motion, шрифты Unbounded + Golos Text,
          адаптив, поддержка prefers-reduced-motion.`,
      },
      {
        n: 3,
        title: 'Вариант 3 — «Рассвет»',
        date: '2026-07-12',
        tags: ['React', 'Framer Motion', 'современный', 'scroll-story'],
        info: `
          <h3>Концепция</h3>
          Страница рассказывает историю: начинается на тёмном предрассветном небе и
          по мере скролла светлеет до мирного дня — путь из военного времени к своему делу.
          Современная типографика Geologica, панели с мягкими радиусами, стеклянная
          навигация-капсула. Без контурного текста.
          <h3>Вау-эффекты</h3>
          <ul>
            <li>Живое небо: фон, облака и восход солнца управляются скроллом</li>
            <li>Заголовок hero выезжает из-под маски построчно</li>
            <li>Текст миссии проявляется слово за словом при чтении</li>
            <li>Карточки программы складываются в стопку (sticky stack)</li>
            <li>География — горизонтальная лента городов, движимая вертикальным скроллом</li>
            <li>Спикеры — карусель с перетаскиванием мышью/пальцем</li>
          </ul>
          <h3>Статус</h3>
          <ul>
            <li>Спикеры — заглушки, ссылка регистрации — заглушка, контакты условные</li>
          </ul>
          <h3>Технически</h3>
          React 18 + Tailwind 4 + Framer Motion, шрифт Geologica,
          адаптив (мобайл получает вертикальную географию), prefers-reduced-motion.`,
      },
    ];

    const grid = document.getElementById('grid');

    for (const v of VARIANTS) {
      const url = `./${v.n}/`;
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="preview">
          <iframe src="${url}" loading="lazy" tabindex="-1" title="Превью: ${v.title}"></iframe>
          <a class="open-overlay" href="${url}"><span>Открыть вариант →</span></a>
        </div>
        <div class="meta">
          <div class="meta-top">
            <a class="title-link" href="${url}">${v.title}</a>
            <button class="info-btn" aria-expanded="false" aria-controls="info-${v.n}"
              aria-label="Информация о варианте ${v.n}">?</button>
          </div>
          <div class="tags">${v.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="date">Добавлен: ${v.date} · ссылка: <code>/${v.n}/</code></div>
        </div>
        <div class="info-wrap" id="info-${v.n}">
          <div class="info-body">${v.info}</div>
        </div>`;
      const btn = card.querySelector('.info-btn');
      const wrap = card.querySelector('.info-wrap');
      btn.addEventListener('click', () => {
        const open = card.classList.toggle('open');
        btn.setAttribute('aria-expanded', String(open));
        btn.textContent = open ? '×' : '?';
        if (open) {
          wrap.style.height = wrap.scrollHeight + 'px';
          wrap.addEventListener('transitionend', function done(e) {
            if (e.propertyName === 'height' && card.classList.contains('open')) {
              wrap.style.height = 'auto';
            }
            wrap.removeEventListener('transitionend', done);
          });
        } else {
          wrap.style.height = wrap.scrollHeight + 'px';
          void wrap.offsetHeight; // фиксируем текущую высоту перед схлопыванием
          wrap.style.height = '0px';
        }
      });
      grid.appendChild(card);
    }

    // Масштабируем iframe-превью под ширину карточки (рендерится как десктоп 1280px)
    function scalePreviews() {
      document.querySelectorAll('.preview').forEach((p) => {
        const iframe = p.querySelector('iframe');
        iframe.style.transform = `scale(${p.clientWidth / 1280})`;
      });
    }
    scalePreviews();
    addEventListener('resize', scalePreviews);
  </script>
</body>
</html>
