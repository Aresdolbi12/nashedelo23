    <style>
      /* Мгновенный экран загрузки: тихая заливка в цвет фона, рисуется до
         подхвата JS и плавно растворяется React'ом (Intro). Никаких точек и
         логотипов — сайт просто мягко проявляется.
         Фон body НЕ задаём: фон (Bg) лежит на z-index:-10 и непрозрачный
         body его перекрыл бы. Пустой экран до JS закрывает #boot своим фоном. */
      #boot {
        position: fixed; inset: 0; z-index: 200;
        background: linear-gradient(180deg, #f7f0e5 0%, #f4ecdf 100%);
      }
    </style>
